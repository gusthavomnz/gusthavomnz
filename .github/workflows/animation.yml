name: Generate Pac-Man

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: gusthavomnz
          outputs: |
            dist/github-contribution-grid-pacman.svg?type=pacman&color_snake=#FFD700&color_dots=#0d1117,#161b22,#21262d,#30363d,#484f58
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
